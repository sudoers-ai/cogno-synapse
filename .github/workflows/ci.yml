name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with all cloud SDKs so the provider tests type-check/run)
        run: |
          python -m pip install --upgrade pip
          # cogno-homeo is a runtime dep not yet on PyPI — install from git first.
          pip install "cogno-homeo @ git+https://github.com/sudoers-ai/cogno-homeo.git"
          pip install -e ".[dev,llm]"
      - name: Lint (ruff)
        run: ruff check cogno_synapse tests examples
      - name: Type-check (mypy)
        run: mypy cogno_synapse
      - name: Unit tests
        # Integration tests against real provider APIs auto-skip without keys;
        # the unit suite mocks every SDK/HTTP client.
        run: pytest tests/unit -q --cov=cogno_synapse --cov-report=term-missing
      - name: Integration tests (auto-skip without Ollama / cloud keys)
        # No Ollama server or API keys in CI → every integration test skips, so
        # this stays green; it runs for real locally (Ollama up) or with keys set.
        run: pytest tests/integration -q
